name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"
          python-version: "3.12.9"
          enable-cache: true
          cache-dependency-glob: services/api/uv.lock
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: uv sync --project services/api --locked
      - run: cargo fetch --locked
      - run: npm run ci

  service-backed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ENVIRONMENT: test
      AUTH_MODE: local
      API_HOST: 127.0.0.1
      POSTGRES_DB: fastlearner
      POSTGRES_USER: fastlearner
      POSTGRES_PASSWORD: ci-postgres-credential
      DATABASE_URL: postgresql+psycopg://fastlearner:ci-postgres-credential@localhost:5432/fastlearner
      REDIS_URL: redis://localhost:6379/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ci-neo4j-credential
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"
          python-version: "3.12.9"
          enable-cache: true
          cache-dependency-glob: services/api/uv.lock
      - run: npm ci
      - run: uv sync --project services/api --locked
      - name: Start required local stores and wait for readiness
        run: docker compose -f infra/docker-compose.yml up -d --wait postgres neo4j redis
      - name: Run migrations, seeds, and service-backed tests
        shell: bash
        run: |
          if [[ -f services/api/alembic.ini && -f services/api/app/commands/seed.py ]]; then
            npm run test:services
          else
            echo "::notice::Migration/seed artifacts are pending their parallel foundation task; running service-backed unit tests."
            npm run test:python
          fi
      - name: Report service health after failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml ps
      - name: Stop service containers
        if: always()
        run: docker compose -f infra/docker-compose.yml down --volumes --remove-orphans
